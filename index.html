<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日式燒肉達人</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>🔥 日式燒肉達人 🔥</h1>

    <div class="mascot-container">
        <img src="kye_jun.png" alt="Kye君" id="kye-mascot">
        <div class="mascot-speech" id="kye-speech">要把肉烤得好吃喔！</div>
    </div>
            <div class="stats">
                <div class="score-board">分數: <span id="score">0</span></div>
                <div class="time-board" id="timer-container">時間: <span id="time">--</span>s</div>
                <div class="message-board" id="message">歡迎光臨！準備好請按開始！</div>
                <div class="controls">
                    <button id="sound-btn" class="sound-btn" onclick="toggleSound()">🔊 音效: 開</button>
                    <button id="abandon-btn" class="abandon-btn" style="display: none;" onclick="abandonGame()">放棄不烤了</button>
                </div>
            </div>
        </header>

        <!-- 遊戲開始與關卡選擇畫面 -->
        <div id="start-screen" class="start-screen">
            <h2>選擇關卡開始營業</h2>
            <div class="level-buttons">
                <button class="level-btn" onclick="startGame(1)">
                    <h3>Level 1: 自由燒烤</h3>
                    <p>60秒內獲得200分即可過關！</p>
                </button>
                <button class="level-btn" onclick="startGame(2)">
                    <h3>Level 2: 客戶指定烤</h3>
                    <p>90秒內完成左側訂單(不可烤焦)</p>
                </button>
                <button class="level-btn" onclick="startGame(3)">
                    <h3>Level 3: 終極燒烤</h3>
                    <p>120秒內完成進階訂單(必須完美)</p>
                </button>
            </div>
        </div>

        <main>
            <!-- 烤爐區域 -->
            <div class="main-play-area">
                <div class="grill-section">
                    <div class="grill-container">
                        <div class="grill-mesh">
                            <!-- 烤網格子，用 JS 動態生成 -->
                        </div>
                <div class="coals">
                    <!-- 炭火特效 -->
                    <div class="coal"></div>
                    <div class="coal"></div>
                    <div class="coal"></div>
                    <div class="coal"></div>
                    <div class="coal"></div>
                </div>
                    </div>
                </div>

                <!-- 訂單區域 (Lv2, Lv3 顯示) -->
                <div id="order-panel" class="order-panel" style="display: none;">
                    <h3>📝 客戶訂單</h3>
                    <ul id="order-list">
                        <!-- JS 動態生成 -->
                    </ul>
                </div>
            </div>

            <!-- 食材選擇區 -->
            <div class="ingredients-panel">
                <h2>食材區 (點擊選取，再點烤網放置)</h2>
                <div class="ingredients-list" id="ingredients-list">
                    <!-- JS 生成 -->
                </div>
            </div>
        </main>
    </div>

    <!-- 音效 (新增了烤肉滋滋聲) -->
    <audio id="sizzle-sound" src="sizzle.m4a" loop preload="auto"></audio>
    <script src="script.js?v=4"></script>
</body>
</html>
